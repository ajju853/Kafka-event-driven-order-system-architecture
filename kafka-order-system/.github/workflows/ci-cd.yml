name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - order-service
          - inventory-service
          - notification-service
          - analytics-service
          - audit-service
          - payment-service
          - dlq-replay-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared library
        run: npm run build --workspace=shared

      - name: Lint
        run: npm run lint --workspace=services/${{ matrix.service }}
        continue-on-error: true

      - name: Test
        run: npm run test --workspace=services/${{ matrix.service }}
        continue-on-error: true

  docker-build:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - order-service
          - inventory-service
          - notification-service
          - analytics-service
          - audit-service
          - payment-service
          - dlq-replay-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: frontend

  deploy:
    needs: [docker-build, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/secrets.yaml
          kubectl apply -f kubernetes/kafka.yaml
          kubectl apply -f kubernetes/postgres.yaml
          kubectl apply -f kubernetes/redis.yaml
          kubectl apply -f kubernetes/services.yaml
          kubectl apply -f kubernetes/hpa.yaml
          kubectl apply -f kubernetes/ingress.yaml
          kubectl rollout status deployment/order-service -n order-system
          kubectl rollout status deployment/inventory-service -n order-system
          kubectl rollout status deployment/payment-service -n order-system
          kubectl rollout status deployment/frontend -n order-system
