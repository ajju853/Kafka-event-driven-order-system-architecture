global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:4001"]

  - job_name: "inventory-service"
    static_configs:
      - targets: ["inventory-service:4002"]

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:4003"]

  - job_name: "analytics-service"
    static_configs:
      - targets: ["analytics-service:4004"]

  - job_name: "audit-service"
    static_configs:
      - targets: ["audit-service:4005"]

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:4006"]

  - job_name: "dlq-replay-service"
    static_configs:
      - targets: ["dlq-replay-service:4007"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]
