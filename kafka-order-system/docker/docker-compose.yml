version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo srvr | nc -w 2 localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kafka-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-net

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: orderdb
      POSTGRES_MULTIPLE_DATABASES: orderdb,inventorydb,auditdb,analyticsdb,paymentdb,dlqdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: pg_isready -U orderuser -d orderdb
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-net

  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - kafka-net

  order-service:
    build:
      context: ..
      dockerfile: services/order-service/Dockerfile
    hostname: order-service
    container_name: order-service
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: orderdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kafka-net

  inventory-service:
    build:
      context: ..
      dockerfile: services/inventory-service/Dockerfile
    hostname: inventory-service
    container_name: inventory-service
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: inventorydb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kafka-net

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    hostname: notification-service
    container_name: notification-service
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      KAFKA_BROKER: kafka:29092
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-net

  analytics-service:
    build:
      context: ..
      dockerfile: services/analytics-service/Dockerfile
    hostname: analytics-service
    container_name: analytics-service
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: analyticsdb
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kafka-net

  audit-service:
    build:
      context: ..
      dockerfile: services/audit-service/Dockerfile
    hostname: audit-service
    container_name: audit-service
    ports:
      - "4005:4005"
    environment:
      PORT: 4005
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: auditdb
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kafka-net

  jaeger:
    image: jaegertracing/all-in-one:1.55
    hostname: jaeger
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      LOG_LEVEL: debug
    networks:
      - kafka-net

  payment-service:
    build:
      context: ..
      dockerfile: services/payment-service/Dockerfile
    hostname: payment-service
    container_name: payment-service
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: paymentdb
      JAEGER_ENDPOINT: http://jaeger:14250
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - kafka-net

  dlq-replay-service:
    build:
      context: ..
      dockerfile: services/dlq-replay-service/Dockerfile
    hostname: dlq-replay-service
    container_name: dlq-replay-service
    ports:
      - "4007:4007"
    environment:
      PORT: 4007
      KAFKA_BROKER: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: dlqdb
      NODE_ENV: production
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - kafka-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    hostname: frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_GATEWAY: http://localhost:4001
      NODE_ENV: production
    depends_on:
      order-service:
        condition: service_started
    networks:
      - kafka-net

volumes:
  postgres-data:

networks:
  kafka-net:
    driver: bridge
